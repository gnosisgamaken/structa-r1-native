<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=240, height=282, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%230b0b0b%22/%3E%3Ctext x=%2232%22 y=%2242%22 font-size=%2236%22 text-anchor=%22middle%22 fill=%22%23f4efe4%22%3Es%3C/text%3E%3C/svg%3E" />
  <title>structa</title>
  <style>
    @font-face {
      font-family: 'PowerGrotesk-Regular';
      src: url('./assets/PowerGrotesk-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #050505;
      --panel: rgba(12, 12, 12, 0.98);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f4efe4;
      --muted: rgba(244, 239, 228, 0.58);
      --show: #77d5ff;
      --tell: #92ff9d;
      --know: #f8c15d;
      --now: #ff8a65;
      --safe-top: 0px;
      --font: 'PowerGrotesk-Regular', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    body.input-locked {
      pointer-events: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 28%), var(--bg);
    }

    button, input, textarea, select {
      font: inherit;
      text-transform: lowercase;
    }

    #app {
      width: min(240px, 100vw);
      height: min(292px, 100vh);
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    main {
      position: absolute;
      inset: 0 0 0 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      outline: none;
    }

    svg *:focus {
      outline: none;
    }

    #log-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 26px;
      transform: translateY(0);
      transition: transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1), background 200ms ease, height 200ms ease;
      background: rgba(5, 5, 5, 0.985);
      border-top: 1.5px solid rgba(255, 255, 255, 0.08);
      z-index: 8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-drawer.open {
      inset: 0;
      height: auto;
      transform: translateY(0);
      background: rgba(5, 5, 5, 0.995);
      z-index: 28;
    }

    #log-handle {
      min-height: 26px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 4px 10px 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      letter-spacing: 0.02em;
      font-size: 11px;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-grip {
      width: 20px;
      height: 2px;
      border-radius: 1px;
      background: rgba(255,255,255,0.16);
      flex: 0 0 auto;
    }

    #log-preview {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.78);
      font-size: 11px;
      letter-spacing: 0.01em;
    }

    #log-drawer.open #log-preview {
      display: none;
    }

    #log-chain-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 138, 101, 0.15);
      color: rgba(255, 138, 101, 0.88);
      font-size: 9px;
      letter-spacing: 0.02em;
      flex: 0 0 auto;
    }

    #log-chain-badge.idle {
      display: none;
    }

    #log-chain-badge .chain-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 138, 101, 0.88);
      animation: chain-pulse 1.2s ease-in-out infinite;
    }

    @keyframes chain-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    #log-actions {
      display: none;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    #log-drawer.open #log-actions {
      display: none;
    }

    .log-action {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(244, 239, 228, 0.72);
      border-radius: 4px;
      padding: 3px 8px;
      min-height: 18px;
      font-size: 9px;
      letter-spacing: 0.02em;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log {
      display: none;
      flex: 1 1 auto;
      overflow: hidden;
      padding: 6px 10px 8px;
      font-size: 9px;
      line-height: 1.35;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-drawer.open #log {
      display: block;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: 10px;
    }

    .entry {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.72);
      font-size: 9px;
    }

    #log-drawer.open .entry {
      white-space: normal;
    }

    .muted { color: rgba(244, 239, 228, 0.36); font-size: 9px; }
    .accent { color: rgba(244, 239, 228, 0.96); font-weight: 600; font-size: 9px; }
    .entry[data-kind="chain"] { color: rgba(255, 138, 101, 0.78); }
    .entry[data-kind="decision"] { color: rgba(255, 138, 101, 0.92); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 24;
      background: #080808;
    }

    .overlay.open {
      display: block;
    }

    #app.overlay-active main,
    #app.overlay-active #log-drawer {
      visibility: hidden;
      pointer-events: none;
    }

    #app.overlay-active .overlay.open {
      visibility: visible;
      pointer-events: auto;
    }

    #camera-overlay {
      background: #050505;
    }

    #camera-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #050505;
    }

    #camera-canvas {
      display: none;
    }

    .capture-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .capture-glyph {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8,8,8,0.22);
      box-shadow: none;
      transition: transform 140ms ease, opacity 140ms ease;
      opacity: 0.88;
    }

    #voice-overlay {
      background: #0b140c;
    }

    #camera-glyph {
      display: grid;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid rgba(119,213,255,0.30);
      background: rgba(119,213,255,0.16);
      box-shadow: inset 0 0 0 1px rgba(8,8,8,0.28);
    }

    #camera-hint {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: rgba(244,239,228,0.68);
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 10px;
      letter-spacing: 0.01em;
      pointer-events: none;
      text-transform: lowercase;
    }

    #camera-status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(5,5,5,0.72);
      color: rgba(244,239,228,0.78);
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 10px;
      letter-spacing: 0.01em;
      text-transform: lowercase;
    }

    #voice-glyph {
      width: 18px;
      height: 18px;
      background: rgba(146,255,157,0.88);
      box-shadow: 0 0 18px rgba(146,255,157,0.20);
      opacity: 0.72;
    }

    #voice-overlay.listening .capture-glyph {
      transform: scale(1.08);
      opacity: 1;
      box-shadow: 0 0 0 10px rgba(146,255,157,0.06), 0 0 36px rgba(146,255,157,0.16);
    }

    #voice-wave {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 22px);
      width: 116px;
      height: 28px;
      opacity: 0.72;
    }

    #voice-wave[hidden] {
      display: none;
    }

    #voice-wave .bar {
      transform-origin: center bottom;
      animation: wave 900ms ease-in-out infinite;
    }

    #voice-wave .bar:nth-child(2) { animation-delay: 80ms; }
    #voice-wave .bar:nth-child(3) { animation-delay: 150ms; }
    #voice-wave .bar:nth-child(4) { animation-delay: 230ms; }
    #voice-wave .bar:nth-child(5) { animation-delay: 310ms; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); opacity: 0.32; }
      50% { transform: scaleY(1); opacity: 0.9; }
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 0.5; r: 6; }
      50% { opacity: 1; r: 10; }
    }

    /* Voice overlay: no transition delay — instant appearance */
    #voice-overlay {
      transition: none;
    }

    /* Voice answer mode — different accent color when answering a question */
    #voice-overlay.answer-mode {
      background: #14100a;
    }

    #voice-overlay.answer-mode #voice-glyph {
      background: rgba(248,193,93,0.88);
      box-shadow: 0 0 18px rgba(248,193,93,0.20);
    }

    #voice-overlay.answer-mode #voice-wave .bar {
      fill: rgba(248,193,93,0.9);
    }

    #voice-overlay.answer-mode .capture-glyph {
      box-shadow: 0 0 0 10px rgba(248,193,93,0.06), 0 0 36px rgba(248,193,93,0.16);
    }

    /* Voice status label — visible context indicator */
    #voice-context-label {
      position: absolute;
      bottom: 64px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 13px;
      color: rgba(244, 239, 228, 0.72);
      letter-spacing: 0.01em;
      pointer-events: none;
      display: none;
    }

    #voice-overlay.answer-mode #voice-context-label {
      display: block;
      color: rgba(248, 193, 93, 0.88);
    }

    /* === Spring-jump card animations (V2) === */

    /* Capture flash — brief white overlay */
    svg.capture-flash {
      animation: capture-flash 150ms ease-out;
    }

    @keyframes capture-flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(2.5); }
      100% { filter: brightness(1); }
    }

    /* Card notification spring — bounce effect on home cards */
    [data-card-index] {
      transition: transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Gentle pulse for cards with pending items */
    [data-card-index].notify-pending {
      animation: spring-bounce 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes spring-bounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.08); }
      60% { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    /* Strong notification — new question or decision */
    [data-card-index].notify-urgent {
      animation: spring-urgent 800ms cubic-bezier(0.22, 1.2, 0.36, 1);
    }

    @keyframes spring-urgent {
      0% { transform: scale(1) translateY(0); }
      20% { transform: scale(1.12) translateY(-4px); }
      50% { transform: scale(0.96) translateY(2px); }
      75% { transform: scale(1.04) translateY(-1px); }
      100% { transform: scale(1) translateY(0); }
    }

    /* Surface enter animation — cards slide in */
    .overlay.open {
      animation: surface-enter 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes surface-enter {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* State transition — subtle pulse on background color change */
    #app {
      transition: background-color 200ms ease;
    }

    /* Log drawer spring */
    #log-drawer.open {
      transition: transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 250ms ease,
                  height 250ms ease;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* === SHOW+TELL voice strip === */
    #camera-voice-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      overflow: hidden;
      background: rgba(5, 5, 5, 0.82);
      border-top: 1px solid rgba(146, 255, 157, 0.18);
      transition: height 180ms cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 30;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    #camera-voice-strip.active {
      height: 40px;
    }

    #camera-voice-strip .strip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(146, 255, 157, 0.88);
      flex-shrink: 0;
      animation: strip-pulse 1s ease-in-out infinite;
    }

    @keyframes strip-pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    #camera-voice-strip .strip-text {
      flex: 1;
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 11px;
      color: rgba(146, 255, 157, 0.88);
      letter-spacing: 0.01em;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* === Heartbeat visual micro-pulse === */
    @keyframes heartbeat-pulse {
      0% { transform: translate(0, 0); }
      50% { transform: translate(0.5px, -0.5px); }
      100% { transform: translate(0, 0); }
    }

    svg.heartbeat-pulse {
      animation: heartbeat-pulse 300ms ease-out;
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 240 292" role="img" aria-label="structa project surface"></svg>
    </main>

    <section id="log-drawer" aria-live="polite" aria-expanded="false">
      <button id="log-handle" aria-label="toggle log">
        <span id="log-grip"></span>
        <span id="log-preview">no logs yet</span>
        <span id="log-chain-badge" class="idle"><span class="chain-dot"></span><span id="chain-phase-text">idle</span></span>
      </button>
      <div id="log"></div>
    </section>

    <section id="camera-overlay" class="overlay" aria-hidden="true">
      <video id="camera-preview" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div id="camera-hint"><span>tap to shoot</span><span>hold to narrate</span></div>
      <div class="capture-center">
        <div class="capture-glyph" id="camera-glyph" aria-hidden="true"></div>
      </div>
      <div id="camera-voice-strip"><span class="strip-dot"></span><span class="strip-text"></span></div>
      <div id="camera-status" aria-live="polite">opening camera</div>
    </section>

    <section id="voice-overlay" class="overlay" aria-hidden="true">
      <div class="capture-center">
        <div class="capture-glyph" id="voice-glyph" aria-hidden="true"></div>
      </div>
      <svg id="voice-wave" viewBox="0 0 116 28" aria-hidden="true" hidden>
        <rect class="bar" x="10" y="6" width="10" height="16" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="32" y="2" width="10" height="24" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="54" y="8" width="10" height="12" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="76" y="4" width="10" height="20" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="98" y="7" width="10" height="14" rx="5" fill="rgba(146,255,157,0.9)"></rect>
      </svg>
      <div id="voice-context-label"></div>
      <div id="voice-transcript" class="sr-only" aria-live="polite"></div>
      <div id="voice-status" class="sr-only"></div>
    </section>
  </div>

  <script src="js/contracts.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/storage-manager.js"></script>
  <script src="js/rabbit-adapter.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/voice-capture.js"></script>
  <script src="js/camera-capture.js"></script>
  <script src="js/r1-llm.js"></script>
  <script src="js/impact-chain-engine.js"></script>
  <script src="structa-cascade.js"></script>
</body>
</html>
