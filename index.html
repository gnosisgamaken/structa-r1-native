<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#00ff57" />
  <meta name="color-scheme" content="dark" />
  <title>STRUCTA</title>
  <style>
    :root {
      --bg: #020202;
      --status-green: #00ff57;
      --line: rgba(255,255,255,0.10);
      --text: #f8f4eb;
      --muted: #a0a0a0;
      --core: #ff4666;
      --memory: #ffc93a;
      --output: #ff9b54;
      --support: #71ff8a;
      --contract: #4f95ff;
      --validator: #fff8ec;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,255,87,0.05), transparent 16%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 24%),
        linear-gradient(to bottom, rgba(255,255,255,0.015), transparent 18%),
        var(--bg);
      background-size: auto, auto, auto, auto, auto;
    }

    #app {
      width: min(240px, 100vw);
      height: min(282px, 100vh);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: transparent;
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .tile {
      transform-origin: center;
      transition: transform 180ms cubic-bezier(.18,.67,.3,1.18), opacity 180ms ease, filter 180ms ease;
      cursor: pointer;
      will-change: transform, filter;
      touch-action: none;
    }

    .tile:hover {
      transform: translateY(-2px);
    }

    .tile:active {
      transform: translateY(0) scale(0.99);
    }

    .tile:focus-visible {
      outline: none;
    }

    .tile.selected {
      transform: scale(1.012);
    }

    .tile.active {
      transform: scale(1.028);
    }

    .tile.hidden {
      display: none;
    }

    .tile.hidden.reveal {
      display: inline;
    }

    .tile-core.selected { filter: drop-shadow(0 0 12px rgba(255,70,102,0.50)); }
    .tile-memory.selected { filter: drop-shadow(0 0 12px rgba(255,201,58,0.48)); }
    .tile-output.selected { filter: drop-shadow(0 0 12px rgba(255,155,84,0.48)); }
    .tile-support.selected { filter: drop-shadow(0 0 12px rgba(113,255,138,0.44)); }
    .tile-contract.selected { filter: drop-shadow(0 0 12px rgba(79,149,255,0.44)); }
    .tile-validator.selected { filter: drop-shadow(0 0 12px rgba(255,248,236,0.42)); }

    .tile-rect {
      stroke: rgba(255,255,255,0.06);
      stroke-width: 1;
      shape-rendering: geometricPrecision;
    }

    .tile-title {
      font-family: Inter, system-ui, sans-serif;
      font-size: 18px;
      letter-spacing: 0.03em;
      text-transform: none;
      font-weight: 700;
    }

    .tile-note {
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .tile:focus-visible .tile-rect {
      stroke: rgba(255,255,255,0.26);
      stroke-width: 1.4;
    }

    .tile.selected .tile-rect {
      stroke: rgba(255,255,255,0.24);
      stroke-width: 1.25;
    }

    .frame {
      fill: none;
      stroke: rgba(255,255,255,0.025);
      stroke-width: 1;
    }

    #welcome-tip {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 30;
      display: none;
      justify-content: center;
      pointer-events: none;
    }

    #welcome-tip.show {
      display: flex;
    }

    .welcome-card {
      width: min(100%, 456px);
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(9,9,9,0.94);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      border-radius: 18px;
      padding: 12px 14px;
      box-sizing: border-box;
      pointer-events: auto;
    }

    @media (max-height: 340px), (max-width: 300px) {
      #welcome-tip {
        display: none !important;
      }
    }

    .welcome-kicker {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
    }

    .welcome-title {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .welcome-copy {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.35;
      color: rgba(255,255,255,0.72);
    }

    #welcome-dismiss {
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.05);
      color: #f6f0e6;
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      font-size: 11px;
      min-height: 34px;
    }

    .glow-line {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 1;
    }

    #log-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(66px, 24%);
      transform: translateY(calc(100% - 14px));
      transition: transform 220ms cubic-bezier(.18,.67,.2,1), box-shadow 220ms ease;
      z-index: 10;
      will-change: transform;
      pointer-events: auto;
      backdrop-filter: blur(12px);
      box-shadow: 0 -12px 30px rgba(0,0,0,0.20);
    }

    #log-drawer.open {
      transform: translateY(0);
    }

    #log-handle {
      width: 100%;
      min-height: 14px;
      border: 0;
      margin: 0;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      box-sizing: border-box;
      color: #d9d1c2;
      background: linear-gradient(180deg, rgba(12,12,12,0.98), rgba(8,8,8,0.985));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    #log-handle .log-copy {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    #log-handle .log-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    #log-handle .log-kicker {
      display: none;
    }

    #log-handle .log-title {
      font-size: 12px;
      letter-spacing: 0.09em;
      color: rgba(246,240,230,0.88);
    }

    #log-handle .capture-preview {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
      color: rgba(246,240,230,0.82);
      overflow: hidden;
    }

    #capture-thumb-shell {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border-radius: 7px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #capture-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #capture-preview-copy {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    #log-handle .log-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    #log-handle .log-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: rgba(246,240,230,0.82);
      font-size: 9px;
      letter-spacing: 0.12em;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    #log-handle .log-chip.live {
      color: rgba(255,255,255,0.62);
      border-color: rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.025);
    }

    #log-handle .handle-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 2px;
    }

    #capture-launcher {
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      color: #f6f0e6;
      border-radius: 999px;
      padding: 7px 13px;
      font: inherit;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #capture-launcher:active {
      transform: scale(0.98);
    }

    #capture-tray {
      position: absolute;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      box-sizing: border-box;
      z-index: 20;
      background: rgba(0,0,0,0.32);
    }

    #capture-tray.open {
      display: flex;
    }

    #capture-sheet {
      width: min(100%, 480px);
      max-height: 86vh;
      border-radius: 20px 20px 12px 12px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(9,9,9,0.98);
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      padding: 12px;
      box-sizing: border-box;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .capture-hint {
      color: rgba(255,255,255,0.38);
      font-size: 10px;
      margin-top: 4px;
      display: none;
    }

    .capture-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .capture-kicker {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.44);
    }

    .capture-title {
      margin-top: 2px;
      font-size: 15px;
      font-weight: 600;
    }

    .capture-row button,
    .capture-foot button,
    #capture-launcher,
    .capture-surface-note,
    .capture-foot {
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.04);
      color: #f6f0e6;
      border-radius: 999px;
      padding: 10px 12px;
      font: inherit;
      font-size: 12px;
      min-height: 40px;
      touch-action: manipulation;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .capture-row button:hover,
    .capture-foot button:hover,
    #capture-launcher:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.07);
    }

    .capture-row button:active,
    .capture-foot button:active,
    #capture-launcher:active {
      transform: translateY(0) scale(0.99);
    }

    .capture-row button:focus-visible,
    .capture-foot button:focus-visible,
    #capture-launcher:focus-visible {
      outline: 1px solid rgba(255,255,255,0.24);
      outline-offset: 2px;
    }

    .capture-panel.active {
      border-color: rgba(255,255,255,0.22);
    }

    .capture-panel {
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    .capture-panel.active {
      display: flex;
    }

    .capture-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #voice-start,
    #camera-capture {
      width: 100%;
      min-height: 48px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
      border-color: rgba(255,255,255,0.14);
    }

    #camera-preview {
      cursor: pointer;
    }

    #camera-preview:active {
      opacity: 0.96;
    }

    #voice-transcript {
      width: 100%;
      min-height: 96px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      box-sizing: border-box;
      padding: 12px 14px;
      font: inherit;
      font-size: 13px;
      line-height: 1.45;
      outline: none;
      white-space: pre-wrap;
      overflow: hidden;
      display: block;
    }

    #camera-preview {
      width: 100%;
      height: min(100%, 172px);
      display: block;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      aspect-ratio: 1 / 1.03;
      object-fit: cover;
    }

    .capture-foot {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      color: rgba(255,255,255,0.52);
      font-size: 11px;
    }

    #log-handle .grip {
      width: 34px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.26);
      flex: 0 0 auto;
    }

    #log-handle .state {
      color: rgba(255,255,255,0.40);
    }

    #log {
      height: calc(100% - 34px);
      background: rgba(8,8,8,0.98);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      line-height: 1.35;
      padding: 7px 12px 10px;
      box-sizing: border-box;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .entry {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bcbcbc;
      opacity: 0.95;
    }

    .muted { color: var(--muted); }
    .accent { color: #ccb08d; }



    @media (max-width: 480px) {
      #welcome-tip { top: 8px; left: 8px; right: 8px; }
      #log-drawer { height: min(112px, 36vh); }
      #log { font-size: 8.8px; }
      #capture-tray { padding: 8px; }
      #capture-sheet { width: 100%; padding: 10px; border-radius: 16px 16px 8px 8px; }
      .capture-title { font-size: 13px; }
      .capture-row { gap: 6px; }
      .capture-row button,
      .capture-foot button,
      #capture-launcher { padding: 9px 10px; font-size: 11px; min-height: 36px; }
      #voice-transcript { min-height: 84px; font-size: 12px; }
      #camera-preview { aspect-ratio: 1 / 1.03; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 240 220" role="img" aria-label="Native panel composition"></svg>
    </main>

    <section id="log-drawer" aria-live="polite" aria-expanded="false">
      <div id="log-handle" role="button" tabindex="0" aria-label="Toggle log">
        <span class="capture-preview" id="capture-preview" aria-live="polite">
          <span id="capture-preview-copy"></span>
        </span>
      </div>
      <div id="log"></div>
    </section>

    <section id="capture-tray" aria-hidden="true">
      <div id="capture-sheet">
        <div class="capture-head">
          <div>
            <div class="capture-kicker">CAPTURE</div>
            <div class="capture-title" id="capture-title">Voice</div>
          </div>
        </div>
        <div class="capture-panel active" data-panel="voice">
          <div id="voice-transcript" aria-live="polite" class="sr-only"></div>
          <div id="voice-status" class="sr-only"></div>
        </div>

        <div class="capture-panel" data-panel="camera">
          <video id="camera-preview" autoplay playsinline muted></video>
          <canvas id="camera-canvas" hidden></canvas>
          <div id="camera-status" class="sr-only"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/contracts.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/context-router.js"></script>
  <script src="js/rabbit-adapter.js"></script>
  <script src="js/capture-bundles.js"></script>
  <script src="js/voice-capture.js"></script>
  <script src="js/camera-capture.js"></script>
  <script src="structa-cascade.js"></script>
</body>
</html>
