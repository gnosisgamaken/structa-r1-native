<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Structa v1.1 — Panel</title>
  <style>
    :root {
      --bg: #050505;
      --line: rgba(255,255,255,0.08);
      --text: #f2efe8;
      --muted: #8a8a8a;
      --core: #d15d69;
      --memory: #d8a64c;
      --output: #c79b73;
      --support: #88b486;
      --contract: #4d7ebc;
      --validator: #ece7dc;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      display: flex;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.018), transparent 42%),
        linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 40px 40px, 40px 40px, auto;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: rgba(5,5,5,0.98);
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .tile {
      transform-origin: center;
      transition: transform 180ms cubic-bezier(.18,.67,.3,1.18), opacity 180ms ease, filter 180ms ease;
      cursor: pointer;
    }

    .tile.selected {
      transform: scale(1.02);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.06));
    }

    .tile.active {
      transform: scale(1.045);
    }

    .tile-rect {
      stroke: rgba(255,255,255,0.09);
      stroke-width: 1;
      shape-rendering: geometricPrecision;
    }

    .tile-title {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      fill: rgba(255,255,255,0.48);
      pointer-events: none;
      user-select: none;
    }

    .tile-note {
      font-size: 7px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      fill: rgba(255,255,255,0.28);
      pointer-events: none;
      user-select: none;
    }

    .frame {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 1;
    }

    .glow-line {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 1;
    }

    #log {
      height: 66px;
      flex: 0 0 auto;
      border-top: 1px solid var(--line);
      background: rgba(8,8,8,0.98);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      line-height: 1.35;
      padding: 6px 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .entry {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bcbcbc;
    }

    .muted { color: var(--muted); }
    .accent { color: #ccb08d; }

    .hint {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 72px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      color: rgba(255,255,255,0.30);
      font-size: 8px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      #log { height: 68px; font-size: 8.5px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 480 322" role="img" aria-label="Native panel composition"></svg>
      <div class="hint" id="hint">tap / swipe / keys • hold core or memory for deeper layer</div>
    </main>

    <section id="log" aria-live="polite">
      <div class="entry"><span class="muted">[--:--]</span> Panel loaded.</div>
      <div class="entry"><span class="muted">[--:--]</span> Four-node primary state active.</div>
      <div class="entry"><span class="muted">[--:--]</span> Hold to reveal deeper nodes.</div>
    </section>
  </div>

  <script src="structa-cascade.js"></script>
</body>
</html>
