<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%230b0b0b%22/%3E%3Ctext x=%2232%22 y=%2242%22 font-size=%2236%22 text-anchor=%22middle%22 fill=%22%23f4efe4%22%3Es%3C/text%3E%3C/svg%3E" />
  <title>structa</title>
  <style>
    @font-face {
      font-family: 'PowerGrotesk-Regular';
      src: url('./assets/PowerGrotesk-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #050505;
      --panel: rgba(12, 12, 12, 0.98);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f4efe4;
      --muted: rgba(244, 239, 228, 0.58);
      --show: #77d5ff;
      --tell: #92ff9d;
      --know: #f8c15d;
      --now: #ff8a65;
      --safe-top: 23px;
      --font: 'PowerGrotesk-Regular', sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 28%), var(--bg);
    }

    button, input, textarea, select {
      font: inherit;
      text-transform: lowercase;
    }

    #app {
      width: min(240px, 100vw);
      height: min(282px, 100vh);
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    main {
      position: absolute;
      inset: 0 0 0 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #log-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64px;
      transform: translateY(42px);
      transition: transform 180ms ease, background 180ms ease;
      background: rgba(6, 6, 6, 0.96);
      border-top: 1px solid var(--line);
      z-index: 8;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(14px);
    }

    #log-drawer.open {
      inset: 0;
      height: auto;
      transform: translateY(0);
      background: rgba(6, 6, 6, 0.985);
      z-index: 28;
    }

    #log-handle {
      min-height: 18px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 2px 8px 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: space-between;
      letter-spacing: 0.01em;
      font-size: 10px;
    }

    #log-grip {
      width: 16px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.20);
      flex: 0 0 auto;
    }

    #log-preview {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.82);
    }

    #log-actions {
      display: none;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    #log-drawer.open #log-actions {
      display: none;
    }

    .log-action {
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 999px;
      padding: 4px 8px;
      min-height: 20px;
      font-size: 10px;
      letter-spacing: 0.01em;
    }

    #log {
      flex: 1 1 auto;
      overflow: hidden;
      padding: 4px 8px 6px;
      font-size: 9px;
      line-height: 1.2;
    }

    #log-drawer.open #log {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: 8px;
    }

    .entry {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.84);
    }

    #log-drawer.open .entry {
      white-space: normal;
    }

    .muted { color: var(--muted); }
    .accent { color: rgba(255, 255, 255, 0.96); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 24;
      background: #080808;
    }

    .overlay.open {
      display: block;
    }

    #app.overlay-active main,
    #app.overlay-active #log-drawer {
      visibility: hidden;
      pointer-events: none;
    }

    #app.overlay-active .overlay.open {
      visibility: visible;
      pointer-events: auto;
    }

    #camera-overlay {
      background: #000;
    }

    #camera-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #camera-canvas {
      display: none;
    }

    .capture-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .capture-glyph {
      width: auto;
      height: auto;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.78);
      font-size: 46px;
      line-height: 1;
      border: 0;
      background: transparent;
      box-shadow: none;
      transition: transform 140ms ease, opacity 140ms ease;
      text-shadow: 0 0 18px rgba(255,255,255,0.10);
    }

    #voice-overlay {
      background: #0b140c;
    }

    #voice-overlay.listening .capture-glyph {
      transform: scale(1.08);
      opacity: 1;
      box-shadow: 0 0 0 10px rgba(146,255,157,0.06), 0 0 36px rgba(146,255,157,0.16);
    }

    #voice-wave {
      position: absolute;
      left: 50%;
      bottom: 58px;
      transform: translateX(-50%);
      width: 116px;
      height: 28px;
      opacity: 0.72;
    }

    #voice-wave[hidden] {
      display: none;
    }

    #voice-wave .bar {
      transform-origin: center bottom;
      animation: wave 900ms ease-in-out infinite;
    }

    #voice-wave .bar:nth-child(2) { animation-delay: 80ms; }
    #voice-wave .bar:nth-child(3) { animation-delay: 150ms; }
    #voice-wave .bar:nth-child(4) { animation-delay: 230ms; }
    #voice-wave .bar:nth-child(5) { animation-delay: 310ms; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); opacity: 0.32; }
      50% { transform: scaleY(1); opacity: 0.9; }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 240 220" role="img" aria-label="structa project surface"></svg>
    </main>

    <section id="log-drawer" aria-live="polite" aria-expanded="false">
      <button id="log-handle" aria-label="toggle log">
        <span id="log-grip"></span>
        <span id="log-preview">no logs yet</span>
        <span id="log-actions">
          <button class="log-action" id="log-export" type="button" hidden>save 33</button>
        </span>
      </button>
      <div id="log"></div>
    </section>

    <section id="camera-overlay" class="overlay" aria-hidden="true">
      <video id="camera-preview" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div class="capture-center">
        <div class="capture-glyph" id="camera-glyph">◉</div>
      </div>
      <div id="camera-status" class="sr-only"></div>
    </section>

    <section id="voice-overlay" class="overlay" aria-hidden="true">
      <div class="capture-center">
        <div class="capture-glyph" id="voice-glyph">⌇</div>
      </div>
      <svg id="voice-wave" viewBox="0 0 116 28" aria-hidden="true" hidden>
        <rect class="bar" x="10" y="6" width="10" height="16" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="32" y="2" width="10" height="24" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="54" y="8" width="10" height="12" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="76" y="4" width="10" height="20" rx="5" fill="rgba(146,255,157,0.9)"></rect>
        <rect class="bar" x="98" y="7" width="10" height="14" rx="5" fill="rgba(146,255,157,0.9)"></rect>
      </svg>
      <div id="voice-transcript" class="sr-only" aria-live="polite"></div>
      <div id="voice-status" class="sr-only"></div>
    </section>
  </div>

  <script src="js/contracts.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/context-router.js"></script>
  <script src="js/rabbit-runtime-probe.js"></script>
  <script src="js/rabbit-adapter.js"></script>
  <script src="js/capture-bundles.js"></script>
  <script src="js/voice-capture.js"></script>
  <script src="js/camera-capture.js"></script>
  <script src="structa-cascade.js"></script>
</body>
</html>
