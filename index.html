<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=240, height=282, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="color-scheme" content="dark" />
  <meta name="copyright" content="© 2026 playgranada / structa. all rights reserved." />
  <link rel="icon" type="image/png" href="https://structa.replit.app/assets/brand/structa-app-icon.png" />
  <link rel="apple-touch-icon" href="https://structa.replit.app/assets/brand/structa-app-icon.png" />
  <title>structa</title>
  <style>
    @font-face {
      font-family: 'PowerGrotesk-Regular';
      src: url('./assets/PowerGrotesk-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #050505;
      --panel: rgba(12, 12, 12, 0.98);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f4efe4;
      --muted: rgba(244, 239, 228, 0.58);
      --show: #77d5ff;
      --tell: #92ff9d;
      --know: #f8c15d;
      --now: #ff8a65;
      --safe-top: 0px;
      --font: 'PowerGrotesk-Regular', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    body.input-locked {
      pointer-events: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      display: grid;
      place-items: center;
      background: var(--bg);
    }

    button, input, textarea, select {
      font: inherit;
      text-transform: lowercase;
    }

    #app {
      width: min(240px, 100vw);
      height: min(292px, 100vh);
      position: relative;
      overflow: hidden;
      background: transparent;
    }

    main {
      position: absolute;
      inset: 0 0 0 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      outline: none;
    }

    svg *:focus {
      outline: none;
    }

    #log-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28px;
      transform: translateY(0);
      transition: transform 220ms ease, background 220ms ease, height 220ms ease;
      background: rgba(5, 5, 5, 0.985);
      border-top: 1.5px solid rgba(255, 255, 255, 0.08);
      z-index: 8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-drawer.open {
      inset: 0;
      height: auto;
      transform: translateY(0);
      background: rgba(5, 5, 5, 0.995);
      z-index: 28;
    }

    #log-handle {
      min-height: 28px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 5px 12px 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      letter-spacing: 0.01em;
      font-size: 12px;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-grip {
      width: 20px;
      height: 2px;
      border-radius: 1px;
      background: rgba(255,255,255,0.16);
      flex: 0 0 auto;
    }

    #log-preview {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.58);
      font-size: 10px;
      letter-spacing: 0.03em;
      text-transform: lowercase;
    }

    #log-drawer.open #log-preview {
      display: none;
    }

    #log-chain-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 138, 101, 0.15);
      color: rgba(255, 138, 101, 0.88);
      font-size: 10px;
      letter-spacing: 0.01em;
      flex: 0 0 auto;
    }

    #log-chain-badge.idle {
      display: none;
    }

    #log-chain-badge .chain-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 138, 101, 0.72);
      opacity: 0.72;
    }

    @keyframes chain-pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.82; }
    }

    #log-actions {
      display: none;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    #log-drawer.open #log-actions {
      display: none;
    }

    .log-action {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(244, 239, 228, 0.72);
      border-radius: 4px;
      padding: 3px 8px;
      min-height: 18px;
      font-size: 9px;
      letter-spacing: 0.02em;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-ops {
      display: none;
      min-height: 56px;
      padding: 8px 12px 6px;
      border-top: 1px solid rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 10px;
      line-height: 1.45;
      color: rgba(244,239,228,0.72);
      font-family: 'PowerGrotesk-Regular', sans-serif;
      text-transform: lowercase;
    }

    #log-drawer.open #log-ops {
      display: block;
    }

    #log-queue-row,
    #log-phase-row,
    #log-stats-row {
      white-space: pre-line;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #log-stats-row {
      color: rgba(244,239,228,0.52);
      margin-top: 4px;
    }

    #log {
      display: none;
      flex: 1 1 auto;
      overflow: hidden;
      padding: 10px 12px 12px;
      font-size: 11px;
      line-height: 1.45;
      font-family: 'PowerGrotesk-Regular', sans-serif;
    }

    #log-drawer.open #log {
      display: block;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: 10px;
    }

    .entry {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(244, 239, 228, 0.72);
      font-size: 11px;
    }

    #log-drawer.open .entry {
      white-space: normal;
    }

    .muted { color: rgba(244, 239, 228, 0.42); font-size: 10px; flex: 0 0 auto; min-width: 52px; }
    .accent { color: rgba(244, 239, 228, 0.96); font-weight: 600; font-size: 10px; }
    .entry[data-kind="chain"] { color: rgba(255, 138, 101, 0.78); }
    .entry[data-kind="decision"] { color: rgba(255, 138, 101, 0.92); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 24;
      background: #080808;
    }

    .overlay.open {
      display: block;
    }

    #app.overlay-active main,
    #app.overlay-active #log-drawer {
      visibility: hidden;
      pointer-events: none;
    }

    #app.overlay-active .overlay.open {
      visibility: visible;
      pointer-events: auto;
    }

    #camera-overlay {
      background: #050505;
    }

    #camera-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #050505;
    }

    #camera-canvas {
      display: none;
    }

    .capture-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .capture-glyph {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8,8,8,0.22);
      box-shadow: none;
      transition: transform 140ms ease, opacity 140ms ease;
      opacity: 0.88;
    }

    #voice-overlay {
      background: #0b140c;
    }

    #camera-glyph {
      display: grid;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid rgba(119,213,255,0.30);
      background: rgba(119,213,255,0.16);
      box-shadow: inset 0 0 0 1px rgba(8,8,8,0.28);
    }

    #camera-hint {
      display: none;
    }

    #camera-status {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(5,5,5,0.76);
      color: rgba(244,239,228,0.74);
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 10px;
      letter-spacing: 0.01em;
      text-transform: lowercase;
    }

    #voice-glyph {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,92,92,0.92);
      box-shadow: 0 0 18px rgba(255,92,92,0.22);
      opacity: 0.76;
      animation: pulse-red 450ms ease-in-out infinite;
    }

    #voice-overlay.listening .capture-glyph {
      transform: scale(1.04);
      opacity: 1;
      box-shadow: 0 0 0 8px rgba(255,92,92,0.06), 0 0 28px rgba(255,92,92,0.16);
    }

    #voice-wave {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 22px);
      width: 116px;
      height: 28px;
      opacity: 0.72;
    }

    #voice-wave[hidden] {
      display: none;
    }

    #voice-wave .bar {
      transform-origin: center bottom;
      animation: wave 400ms ease-in-out infinite;
    }

    #voice-wave .bar:nth-child(2) { animation-delay: 80ms; }
    #voice-wave .bar:nth-child(3) { animation-delay: 150ms; }
    #voice-wave .bar:nth-child(4) { animation-delay: 230ms; }
    #voice-wave .bar:nth-child(5) { animation-delay: 310ms; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); opacity: 0.32; }
      50% { transform: scaleY(1); opacity: 0.9; }
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 0.5; r: 6; }
      50% { opacity: 1; r: 10; }
    }

    /* Voice overlay: no transition delay — instant appearance */
    #voice-overlay {
      transition: none;
    }

    /* Voice answer mode — different accent color when answering a question */
    #voice-overlay.answer-mode {
      background: #14100a;
    }

    #voice-overlay.answer-mode #voice-glyph {
      background: rgba(244,239,228,0.72);
      box-shadow: 0 0 18px rgba(244,239,228,0.16);
    }

    #voice-overlay.answer-mode #voice-wave .bar {
      fill: rgba(244,239,228,0.72);
    }

    #voice-overlay.answer-mode .capture-glyph {
      box-shadow: 0 0 0 10px rgba(244,239,228,0.06), 0 0 36px rgba(244,239,228,0.12);
    }

    /* Voice status label — visible context indicator */
    #voice-context-label {
      position: absolute;
      bottom: 64px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 12px;
      color: rgba(244, 239, 228, 0.58);
      letter-spacing: 0.02em;
      pointer-events: none;
      display: none;
    }

    #voice-overlay.answer-mode #voice-context-label {
      color: rgba(244, 239, 228, 0.72);
    }

    /* === Calm motion system === */

    /* Capture flash — brief white overlay */
    svg.capture-flash {
      animation: capture-flash 150ms ease-out;
    }

    @keyframes capture-flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(2.5); }
      100% { filter: brightness(1); }
    }

    /* Card notification pulse — subtle and anchored */
    [data-card-index] {
      transition: transform 140ms ease, opacity 140ms ease;
    }

    /* Gentle pulse for cards with pending items */
    [data-card-index].notify-pending {
      animation: calm-pulse 420ms ease-out;
    }

    [data-card-index].notify-soft {
      animation: calm-soft 280ms ease-out;
    }

    @keyframes calm-soft {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      45% { transform: translate(0.25px, -0.2px) scale(1.006); opacity: 0.992; }
      100% { transform: translate(0, 0) scale(1); opacity: 1; }
    }

    @keyframes calm-pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    /* Strong notification — still calm, no jumping */
    [data-card-index].notify-urgent {
      animation: calm-emphasis 520ms ease-out;
    }

    @keyframes calm-emphasis {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      45% { transform: translate(0.4px, -0.4px) scale(1.012); opacity: 0.985; }
      100% { transform: translate(0, 0) scale(1); opacity: 1; }
    }

    /* Surface enter animation — cards slide in */
    .overlay.open {
      animation: surface-enter 220ms ease-out;
    }

    @keyframes surface-enter {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* State transition — subtle pulse on background color change */
    #app {
      transition: background-color 200ms ease;
    }

    /* Log drawer transition */
    #log-drawer.open {
      transition: transform 220ms ease,
                  background 220ms ease,
                  height 220ms ease;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* === SHOW+TELL voice strip === */
    #camera-voice-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0;
      overflow: hidden;
      background: rgba(8, 8, 8, 0.86);
      border-top: 1px solid rgba(255, 92, 92, 0.20);
      transition: height 180ms cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 30;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
    }

    #camera-voice-strip.active {
      height: 44px;
    }

    #camera-voice-strip .strip-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 92, 92, 0.92);
      box-shadow: 0 0 14px rgba(255, 92, 92, 0.22);
      flex-shrink: 0;
      animation: pulse-red 450ms ease-in-out infinite;
    }

    #camera-voice-strip .strip-text {
      flex: 1;
      font-family: 'PowerGrotesk-Regular', sans-serif;
      font-size: 11px;
      color: rgba(244, 239, 228, 0.90);
      letter-spacing: 0.01em;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* Heartbeat motion is applied per-card in JS to avoid shifting the whole scene. */
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 240 292" role="img" aria-label="structa project surface"></svg>
    </main>

    <section id="log-drawer" aria-live="polite" aria-expanded="false">
      <button id="log-handle" aria-label="toggle activity log">
        <span id="log-grip"></span>
        <span id="log-preview">activity</span>
        <span id="log-chain-badge" class="idle"><span class="chain-dot"></span><span id="chain-phase-text">idle</span></span>
      </button>
      <div id="log-ops" hidden>
        <div id="log-queue-row">queue · clear</div>
        <div id="log-phase-row">chain idle · □□□□□</div>
        <div id="log-stats-row">captures 0 · signals 0 · decisions 0 · open 0</div>
      </div>
      <div id="log"></div>
    </section>

    <section id="camera-overlay" class="overlay" aria-hidden="true">
      <video id="camera-preview" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div id="camera-hint" aria-hidden="true"><span></span><span></span></div>
      <div class="capture-center">
        <div class="capture-glyph" id="camera-glyph" aria-hidden="true"></div>
      </div>
      <div id="camera-voice-strip"><span class="strip-dot"></span><span class="strip-text"></span></div>
      <div id="camera-status" aria-live="polite">opening lens</div>
    </section>

    <section id="voice-overlay" class="overlay" aria-hidden="true">
      <div class="capture-center">
        <div class="capture-glyph" id="voice-glyph" aria-hidden="true"></div>
      </div>
      <svg id="voice-wave" viewBox="0 0 116 28" aria-hidden="true" hidden>
        <rect class="bar" x="10" y="6" width="10" height="16" rx="5" fill="rgba(255,92,92,0.9)"></rect>
        <rect class="bar" x="32" y="2" width="10" height="24" rx="5" fill="rgba(255,92,92,0.9)"></rect>
        <rect class="bar" x="54" y="8" width="10" height="12" rx="5" fill="rgba(255,92,92,0.9)"></rect>
        <rect class="bar" x="76" y="4" width="10" height="20" rx="5" fill="rgba(255,92,92,0.9)"></rect>
        <rect class="bar" x="98" y="7" width="10" height="14" rx="5" fill="rgba(255,92,92,0.9)"></rect>
      </svg>
      <div id="voice-context-label"></div>
      <div id="voice-transcript" class="sr-only" aria-live="polite"></div>
      <div id="voice-status" class="sr-only"></div>
    </section>
  </div>

  <script>
    window.StructaBuild = Object.freeze({
      uiBuildId: 'ui-20260420-ae1-ebe4e37',
      declaredDiagnosticTests: 37
    });

  <script src="js/camera-capture.js?v=20260420a"></script>
  <script src="js/orchestrator.js?v=20260417"></script>
  <script src="js/r1-llm.js?v=20260420g"></script>

  <script src="structa-cascade.js?v=20260420e"></script>
</body>
</html>
