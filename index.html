<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Structa v0.9 — Composition</title>
  <style>
    :root {
      --bg: #050505;
      --line: rgba(255,255,255,0.07);
      --text: #f2efe6;
      --muted: #8c8c8c;
      --core: #c75f6a;
      --memory: #d7a94f;
      --contract: #4f7dbb;
      --validator: #efe9dc;
      --output: #c69d74;
      --support: #88b487;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.025), transparent 44%),
        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 40px 40px, 40px 40px, auto;
    }

    #app {
      width: min(100vw, 100vh, 480px);
      height: min(100vw, 100vh, 480px);
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(6,6,6,0.97);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4) inset;
    }

    header {
      height: 34px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-bottom: 1px solid var(--line);
      box-sizing: border-box;
    }

    .title {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
    }

    .meta {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    main {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tile {
      transform-origin: center;
      transition: transform 180ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease;
    }

    .tile.active {
      transform: scale(1.035);
    }

    .frame {
      fill: rgba(255,255,255,0.01);
      stroke: rgba(255,255,255,0.06);
      stroke-width: 1;
    }

    .tile-bg {
      opacity: 1;
    }

    .outline {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1;
    }

    .label {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-anchor: middle;
      fill: rgba(255,255,255,0.64);
      user-select: none;
      pointer-events: none;
    }

    .action-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 80px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    button {
      pointer-events: auto;
      appearance: none;
      height: 32px;
      min-width: 154px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: var(--text);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.35) inset;
    }

    button:active { transform: translateY(1px); }

    #log {
      height: 80px;
      border-top: 1px solid var(--line);
      background: rgba(8,8,8,0.98);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      line-height: 1.4;
      padding: 7px 10px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .entry {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bcbcbc;
    }

    .muted { color: var(--muted); }
    .accent { color: #c6b08d; }

    @media (max-width: 480px) {
      #app {
        width: 100vw;
        height: 100vh;
        border: none;
      }
      header { height: 32px; padding: 0 8px; }
      .title { font-size: 8px; }
      .meta { font-size: 7px; }
      #log { height: 82px; font-size: 9.5px; }
      .action-bar { bottom: 82px; }
      button { min-width: 148px; height: 30px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="title">Structa v0.9 — Composition</div>
      <div class="meta">Atlas • Project Cognition</div>
    </header>

    <main>
      <svg id="ui" viewBox="0 0 480 368" role="img" aria-label="Modular geometric composition"></svg>
      <div class="action-bar">
        <button id="runBtn">Trigger Composition</button>
      </div>
    </main>

    <section id="log" aria-live="polite">
      <div class="entry"><span class="muted">[--:--]</span> Modular composition loaded.</div>
      <div class="entry"><span class="muted">[--:--]</span> R1-safe poster mode active.</div>
    </section>
  </div>

  <script src="structa-cascade.js"></script>
</body>
</html>
