<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Structa v0.5 — Bauhaus Hexagon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

        :root {
            --bg: #050505;
            --text: #f4f4f0;
            --red: #9f1d35;
            --yellow: #e3a857;
            --blue: #1e4b7c;
            --neutral: #d9c2a3;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 14px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 17px;
            letter-spacing: -0.4px;
        }

        .title { font-weight: 600; }
        .subtitle { font-size: 13px; color: #666; font-family: 'IBM Plex Mono', monospace; }

        #canvas {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                linear-gradient(to right, rgba(244,244,240,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(244,244,240,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        svg {
            width: 92%;
            height: 92%;
            max-width: 420px;
            max-height: 420px;
        }

        .hex {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        .hex:hover { filter: brightness(1.15); }

        .symbol {
            font-size: 42px;
            dominant-baseline: middle;
            text-anchor: middle;
            pointer-events: none;
        }

        #log {
            height: 138px;
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
            padding: 12px 18px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13.2px;
            line-height: 1.45;
            color: #aaa;
            overflow-y: auto;
        }

        .log-entry { margin-bottom: 4px; }
        .impact { color: #e3a857; }
        button {
            background: #111;
            color: #ddd;
            border: 1px solid #444;
            padding: 7px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'IBM Plex Mono', monospace;
        }
        button:active {
            background: #e3a857;
            color: black;
        }
    </style>
</head>
<body>
    <header>
        <div><span class="title">Structa v0.5</span> — Bauhaus Hexagon</div>
        <div class="subtitle">ATLAS • PROJECT COGNITION</div>
        <div>
            <button onclick="runTestCascade()">TRIGGER CASCADE</button>
        </div>
    </header>

    <div id="canvas">
        <svg id="graph" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div id="log">
        <div class="log-entry">Structa v0.5 Bauhaus Hexagon initialized.</div>
        <div class="log-entry">Pure SVG. Zero canvas. Ready for geometric cascade.</div>
    </div>

    <script src="structa-cascade-v0.5.js"></script>
</body>
</html>
