<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Structa v1.3 — Panel</title>
  <style>
    :root {
      --bg: #020202;
      --line: rgba(255,255,255,0.10);
      --text: #f8f4eb;
      --muted: #a0a0a0;
      --core: #ff4666;
      --memory: #ffc93a;
      --output: #ff9b54;
      --support: #71ff8a;
      --contract: #4f95ff;
      --validator: #fff8ec;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      display: flex;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,79,105,0.10), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(79,149,255,0.06), transparent 26%),
        radial-gradient(circle at 50% 80%, rgba(113,255,138,0.06), transparent 22%),
        linear-gradient(to bottom, rgba(255,255,255,0.02), transparent 22%),
        var(--bg);
      background-size: auto, auto, auto, auto, auto;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: rgba(5,5,5,0.98);
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .tile {
      transform-origin: center;
      transition: transform 180ms cubic-bezier(.18,.67,.3,1.18), opacity 180ms ease, filter 180ms ease;
      cursor: pointer;
    }

    .tile.selected {
      transform: scale(1.02);
    }

    .tile.active {
      transform: scale(1.045);
    }

    .tile-core.selected { filter: drop-shadow(0 0 12px rgba(255,70,102,0.50)); }
    .tile-memory.selected { filter: drop-shadow(0 0 12px rgba(255,201,58,0.48)); }
    .tile-output.selected { filter: drop-shadow(0 0 12px rgba(255,155,84,0.48)); }
    .tile-support.selected { filter: drop-shadow(0 0 12px rgba(113,255,138,0.44)); }
    .tile-contract.selected { filter: drop-shadow(0 0 12px rgba(79,149,255,0.44)); }
    .tile-validator.selected { filter: drop-shadow(0 0 12px rgba(255,248,236,0.42)); }

    .tile-rect {
      stroke: rgba(255,255,255,0.09);
      stroke-width: 1;
      shape-rendering: geometricPrecision;
    }

    .tile-title {
      display: none;
    }

    .tile-note {
      display: none;
    }

    .frame {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 1;
    }

    .glow-line {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 1;
    }

    #log-drawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(112px, 38vh);
      transform: translateY(calc(100% - 22px));
      transition: transform 220ms cubic-bezier(.18,.67,.2,1);
      z-index: 10;
      will-change: transform;
      pointer-events: auto;
    }

    #log-drawer.open {
      transform: translateY(0);
    }

    #log-handle {
      width: 100%;
      height: 22px;
      border: 0;
      margin: 0;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      box-sizing: border-box;
      color: #d9d1c2;
      background: rgba(8,8,8,0.98);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #log-handle .handle-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    #capture-launcher {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #f6f0e6;
      border-radius: 999px;
      padding: 2px 8px;
      font: inherit;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #capture-launcher:active {
      transform: scale(0.98);
    }

    #capture-tray {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      box-sizing: border-box;
      z-index: 20;
      background: rgba(0,0,0,0.32);
    }

    #capture-tray.open {
      display: flex;
    }

    #capture-sheet {
      width: min(100%, 456px);
      max-height: 86vh;
      border-radius: 18px 18px 10px 10px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(9,9,9,0.98);
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      padding: 12px;
      box-sizing: border-box;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }

    .capture-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .capture-kicker {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.44);
    }

    .capture-title {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 600;
    }

    #capture-close,
    .capture-tabs button,
    .capture-row button,
    .capture-foot button {
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.04);
      color: #f6f0e6;
      border-radius: 999px;
      padding: 8px 10px;
      font: inherit;
      font-size: 11px;
    }

    .capture-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .capture-tabs button.active,
    .capture-panel.active {
      border-color: rgba(255,255,255,0.22);
    }

    .capture-panel {
      display: none;
      gap: 10px;
      flex-direction: column;
    }

    .capture-panel.active {
      display: flex;
    }

    .capture-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #voice-transcript {
      width: 100%;
      min-height: 92px;
      resize: none;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      box-sizing: border-box;
      padding: 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.4;
      outline: none;
    }

    #camera-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.10);
      object-fit: cover;
    }

    .capture-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: rgba(255,255,255,0.52);
      font-size: 11px;
    }

    #log-handle .grip {
      width: 34px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.26);
      flex: 0 0 auto;
    }

    #log-handle .state {
      color: rgba(255,255,255,0.46);
    }

    #log {
      height: calc(100% - 22px);
      background: rgba(8,8,8,0.98);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 9px;
      line-height: 1.35;
      padding: 6px 10px 8px;
      box-sizing: border-box;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .entry {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #bcbcbc;
    }

    .muted { color: var(--muted); }
    .accent { color: #ccb08d; }



    @media (max-width: 480px) {
      #log-drawer { height: min(96px, 34vh); }
      #log { font-size: 8.5px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <svg id="scene" viewBox="0 0 480 322" role="img" aria-label="Native panel composition"></svg>
    </main>

    <section id="log-drawer" aria-live="polite" aria-expanded="false">
      <div id="log-handle" role="button" tabindex="0" aria-label="Toggle audit log">
        <span class="grip" aria-hidden="true"></span>
        <span class="label">AUDIT LOG</span>
        <span class="state">SWIPE ↑</span>
        <span class="handle-actions">
          <button id="capture-launcher" type="button" aria-label="Open capture tray">CAPTURE</button>
        </span>
      </div>
      <div id="log">
        <div class="entry"><span class="muted">[--:--]</span> Panel loaded.</div>
        <div class="entry"><span class="muted">[--:--]</span> Four-node primary state active.</div>
        <div class="entry"><span class="muted">[--:--]</span> Hold to reveal deeper nodes.</div>
      </div>
    </section>

    <section id="capture-tray" aria-hidden="true">
      <div id="capture-sheet">
        <div class="capture-head">
          <div>
            <div class="capture-kicker">CAPTURE</div>
            <div class="capture-title">Voice, camera, selfie</div>
          </div>
          <button id="capture-close" type="button">Close</button>
        </div>

        <div class="capture-tabs">
          <button id="tab-voice" type="button" class="active">Voice</button>
          <button id="tab-camera" type="button">Camera</button>
        </div>

        <div class="capture-panel active" data-panel="voice">
          <div class="capture-row">
            <button id="voice-start" type="button">PTT</button>
            <button id="voice-stop" type="button">Stop</button>
          </div>
          <textarea id="voice-transcript" placeholder="Speak or type a transcript here for browser fallback"></textarea>
          <div class="capture-foot">
            <span id="voice-status">Idle</span>
            <button id="voice-submit" type="button">Submit</button>
          </div>
        </div>

        <div class="capture-panel" data-panel="camera">
          <video id="camera-preview" autoplay playsinline muted></video>
          <canvas id="camera-canvas" hidden></canvas>
          <div class="capture-row">
            <button id="camera-open" type="button">Open</button>
            <button id="camera-flip" type="button">Flip</button>
            <button id="camera-selfie" type="button">Selfie</button>
          </div>
          <div class="capture-row">
            <button id="camera-capture" type="button">Capture</button>
            <button id="camera-close-session" type="button">Close cam</button>
          </div>
          <div class="capture-foot">
            <span id="camera-status">Camera idle</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="js/contracts.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/rabbit-adapter.js"></script>
  <script src="js/voice-capture.js"></script>
  <script src="js/camera-capture.js"></script>
  <script src="structa-cascade.js"></script>
</body>
</html>
